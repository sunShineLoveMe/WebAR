<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Stickman AR Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="ar-container"></div>

    <div class="overlay">
      <div class="overlay-card">
        <p class="eyebrow">Stickman AR</p>
        <h1>扫码唤醒火柴人</h1>
        <p id="status-text">扫描图片目标，查看火柴人动作演示</p>
        <button id="start-btn" type="button">启动 AR</button>
        <div class="control-panel hidden" id="control-panel">
          <div class="action-list">
            <button class="action-btn" type="button" data-action="greeting">打招呼</button>
            <button class="action-btn" type="button" data-action="dancing">跳舞</button>
          </div>
          <button class="voice-btn" id="voice-btn" type="button">语音触发动作</button>
          <p class="voice-hint" id="voice-hint">可以说“打招呼”或“跳舞”</p>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
